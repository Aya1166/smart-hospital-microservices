syntax = "proto3";

package hospital.appointment;

service AppointmentService {
  rpc CreateAppointment (CreateAppointmentRequest) returns (AppointmentResponse);
  rpc GetAppointmentsByPatient (GetAppointmentsRequest) returns (AppointmentsListResponse);
}

message CreateAppointmentRequest {
  string patient_id = 1;
  string doctor = 2;
  string date = 3;
}

message AppointmentResponse {
  string id = 1;
  string patient_id = 2;
  string doctor = 3;
  string date = 4;
}

message GetAppointmentsRequest {
  string patient_id = 1;
}

message AppointmentsListResponse {
  repeated AppointmentResponse appointments = 1;
}