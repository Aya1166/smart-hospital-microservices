syntax = "proto3";

package hospital;

// ============================================================================
// 1. PATIENT MICROSERVICE CONTRACTS
// ============================================================================
service PatientService {
  rpc CreatePatient (CreatePatientRequest) returns (PatientResponse);
  rpc GetPatient (GetPatientRequest) returns (PatientResponse);
}

message CreatePatientRequest {
  string name = 1;
  string age = 2;
  string disease = 3;
}

message GetPatientRequest {
  string id = 1;
}

message PatientResponse {
  string id = 1;
  string name = 2;
  string age = 3;
  string disease = 4;
}

// ============================================================================
// 2. APPOINTMENT MICROSERVICE CONTRACTS
// ============================================================================
service AppointmentService {
  rpc CreateAppointment (CreateAppointmentRequest) returns (AppointmentResponse);
  rpc GetAppointmentsByPatient (GetAppointmentsRequest) returns (AppointmentsListResponse);
}

message CreateAppointmentRequest {
  string patient_id = 1;
  string doctor = 2;
  string date = 3;
}

message AppointmentResponse {
  string id = 1;
  string patient_id = 2;
  string doctor = 3;
  string date = 4;
}

message GetAppointmentsRequest {
  string patient_id = 1;
}

message AppointmentsListResponse {
  repeated AppointmentResponse appointments = 1;
}